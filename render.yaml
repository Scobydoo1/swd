# Render Blueprint — backend FastAPI (free tier).
# Dữ liệu bền vững nằm trên Neon Postgres (DATABASE_URL + VECTOR_BACKEND=pgvector)
# vì disk free tier là ephemeral.
services:
  - type: web
    name: maple-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false # postgresql+psycopg2://... (Neon)
      - key: VECTOR_BACKEND
        value: pgvector
      - key: EMBED_PROVIDER
        value: gemini
      - key: LLM_PROVIDER
        value: gemini
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: BREVO_API_KEY
        sync: false # Render chặn SMTP -> gửi mail qua Brevo API (HTTPS)
      - key: MAIL_FROM
        sync: false # sender đã verify trên Brevo (vd Gmail của bạn)
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: APP_LOGIN_URL
        sync: false # https://<app>.vercel.app
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false # thêm https://<app>.vercel.app
