name: Deploy frontend to GitHub Pages

# Build React (Vite) trong frontend/ rồi deploy ra GitHub Pages.
# Backend FastAPI KHÔNG chạy trên Pages — set repo variable VITE_API_BASE
# (Settings -> Secrets and variables -> Actions -> Variables) trỏ tới URL backend
# đã host, ví dụ: https://your-backend.onrender.com/api

on:
  push:
    branches: [main]
  workflow_dispatch:

# Quyền tối thiểu để deploy-pages dùng OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ chạy 1 lần deploy tại một thời điểm.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # Tự bật GitHub Pages (source = GitHub Actions) nếu chưa bật.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build (Vite)
        env:
          # Project site chạy dưới /swd/ (đổi nếu repo đổi tên).
          VITE_BASE: /swd/
          # URL backend public; để trống thì API call sẽ lỗi cho tới khi bạn set.
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: npm run build

      - name: SPA fallback cho deep-link (404 -> index)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
